name: Build StackChan Firmware

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install IDF
        uses: espressif/install-esp-idf-action@v1
        with:
          version: v5.5.4

      - name: Fetch dependencies
        run: |
          cd firmware
          python3 fetch_repos.py

      - name: Build ESP32-S3
        run: |
          $IDF_PATH/tools/idf_tools.py install --targets=esp32s3
          . $IDF_PATH/export.sh
          cd firmware
          idf.py -DIDF_TARGET=esp32s3 build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stackchan-esp32s3
          path: firmware/build/*.bin
          retention-days: 7
